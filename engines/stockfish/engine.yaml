id: stockfish
name: Stockfish
# Published release assets are versioned (stockfish-18-<platform>.tar.gz), so the
# relay's asset basename must include the version even though the engine id is "stockfish".
release_name: stockfish-18
engine: stockfish-18-linux-x86_64
author: T. Romstad, M. Costalba, J. Kiiski, G. Linscott
version: "18"
elo: 3550
style: Aggressive
description: World-leading open-source UCI chess engine using NNUE evaluation.
uci_options:
  Threads: 4
  Ponder: true
license: GPL-3.0
homepage: https://stockfishchess.org/
source_repo: https://github.com/official-stockfish/Stockfish
icon: https://raw.githubusercontent.com/indie99/engines/2abfcd9db26ee968c2b72caba165604483176aaf/stockfish.jpg
banner: https://raw.githubusercontent.com/indie99/engines/2abfcd9db26ee968c2b72caba165604483176aaf/stockfish.jpg
recommended_for:
  - Advanced
  - Engine Tournaments
platforms:
  linux-x86_64:
    engine: stockfish-18-linux-x86_64
    alternatives:
      - stockfish-16-linux-x86_64
      - stockfish-17-linux-x86_64
  macos-silicon:
    engine: stockfish-18-macos-arm64
    alternatives:
      - stockfish-16-macos-arm64
      - stockfish-17-macos-arm64
  windows-x86_64:
    engine: stockfish-18-windows-x86_64.exe
    alternatives:
      - stockfish-16-windows-x86_64.exe
      - stockfish-17-windows-x86_64.exe
